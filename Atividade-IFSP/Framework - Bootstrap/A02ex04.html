<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Venda de Ingresso - Show</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .form-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 30px auto;
            max-width: 600px;
        }
        .form-container h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
        }
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-salvar {
            background-color: #667eea;
            border: none;
            font-weight: 600;
        }
        .btn-salvar:hover {
            background-color: #764ba2;
        }
        .btn-limpar {
            background-color: #6c757d;
            font-weight: 600;
        }
        .btn-limpar:hover {
            background-color: #5a6268;
        }
        .color-option {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .color-option label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }
        .color-box {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 2px solid #ddd;
        }
        .foto-upload {
            position: relative;
        }
        .preview-foto {
            margin-top: 15px;
            display: none;
        }
        .preview-foto img {
            max-width: 150px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🎤 Cadastro de Ingresso - Show</h1>
        
        <form id="formularioIngresso">
            <!-- Seção: Dados do Comprador -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                </div>
                <div class="col-md-6">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="seu.email@exemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="tel" class="form-control" id="telefone" placeholder="(XX) 9XXXX-XXXX" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço</label>
                <input type="text" class="form-control" id="endereco" placeholder="Rua, número, complemento" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="cidade" class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade" placeholder="Sua cidade" required>
                </div>
                <div class="col-md-6">
                    <label for="estado" class="form-label">Estado</label>
                    <input type="text" class="form-control" id="estado" placeholder="SP" maxlength="2" required>
                </div>
            </div>

            <hr class="my-4">

            <!-- Seção: Detalhes do Ingresso -->
            <div class="mb-3">
                <label class="form-label">Cor da Camiseta (Brinde)</label>
                <div class="color-option">
                    <label>
                        <input type="radio" name="camiseta" value="Branco" required>
                        <div class="color-box" style="background-color: white; border: 2px solid #333;"></div>
                        Branco
                    </label>
                    <label>
                        <input type="radio" name="camiseta" value="Preto" required>
                        <div class="color-box" style="background-color: black;"></div>
                        Preto
                    </label>
                    <label>
                        <input type="radio" name="camiseta" value="Azul" required>
                        <div class="color-box" style="background-color: #0066cc;"></div>
                        Azul
                    </label>
                    <label>
                        <input type="radio" name="camiseta" value="Vermelho" required>
                        <div class="color-box" style="background-color: #cc0000;"></div>
                        Vermelho
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label for="setor" class="form-label">Setor da Arquibancada</label>
                <select class="form-select" id="setor" required>
                    <option value="">-- Selecione um setor --</option>
                    <option value="VIP">VIP - Melhor Vista</option>
                    <option value="Setor A">Setor A</option>
                    <option value="Setor B">Setor B</option>
                    <option value="Setor C">Setor C</option>
                    <option value="Setor D">Setor D</option>
                    <option value="Setor E">Setor E</option>
                    <option value="Pista">Pista - Meia Entrada</option>
                </select>
            </div>

            <div class="mb-3 foto-upload">
                <label for="foto" class="form-label">Foto para Crachá</label>
                <input type="file" class="form-control" id="foto" accept="image/*" required>
                <small class="text-muted">Formatos aceitos: JPG, PNG, GIF. Tamanho máximo: 5MB</small>
                <div class="preview-foto" id="previewFoto">
                    <p class="mt-3 mb-2"><strong>Visualização:</strong></p>
                    <img id="imagemPreview" src="" alt="Prévia da foto">
                </div>
            </div>

            <hr class="my-4">

            <!-- Botões -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-limpar btn-lg">Limpar Formulário</button>
                <button type="submit" class="btn btn-salvar btn-lg">Salvar e Confirmar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Pré-visualização da foto
        const inputFoto = document.getElementById('foto');
        const previewDiv = document.getElementById('previewFoto');
        const imagemPreview = document.getElementById('imagemPreview');

        inputFoto.addEventListener('change', function(e) {
            const arquivo = e.target.files[0];
            if (arquivo) {
                const leitor = new FileReader();
                leitor.onload = function(evento) {
                    imagemPreview.src = evento.target.result;
                    previewDiv.style.display = 'block';
                };
                leitor.readAsDataURL(arquivo);
            }
        });

        // Validação e envio do formulário
        document.getElementById('formularioIngresso').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Formulário enviado com sucesso!\n\nDados do comprador registrados.\nBrinde: Camiseta ' + 
                  document.querySelector('input[name="camiseta"]:checked').value +
                  '\nSetor: ' + document.getElementById('setor').value);
            // Aqui você poderia enviar os dados para um servidor
        });

        // Limpar prévia ao limpar o formulário
        document.getElementById('formularioIngresso').addEventListener('reset', function() {
            previewDiv.style.display = 'none';
            imagemPreview.src = '';
        });
    </script>
</body>
</html>
